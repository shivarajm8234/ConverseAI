[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-wss]
type=transport
protocol=ws
bind=0.0.0.0:8088

[2000]
type=aor
max_contacts=1
remove_existing=yes

[2000]
type=auth
auth_type=userpass
username=2000
password=5678

[2000]
type=endpoint
aors=2000
auth=2000
context=internal
direct_media=no
disallow=all
allow=ulaw,alaw

[1001]
type=aor
max_contacts=1
remove_existing=yes

[1001]
type=auth
auth_type=userpass
username=1001
password=1234

[1001]
type=endpoint
aors=1001
auth=1001
webrtc=yes
context=internal
disallow=all
allow=ulaw,alaw,opus
media_encryption=dtls
dtls_auto_generate_cert=yes
dtls_verify=fingerprint
dtls_setup=actpass
ice_support=yes
use_avpf=yes
media_use_received_transport=yes
rtcp_mux=yes
