[internal]
; AI Agent — AGI() works on stock Debian (no res_eagi.so). EAGI() only if you build Asterisk with res_eagi.
exten => 3000,1,Answer()
same => n,Wait(1)
same => n,AGI(/var/lib/asterisk/agi-bin/agent_eagi.js)
same => n,Hangup()

; Call Mobile Extension
exten => 2000,1,Dial(PJSIP/2000)
same => n,Hangup()

; Call WebRTC Extension
exten => 1001,1,Dial(PJSIP/1001)
same => n,Hangup()
